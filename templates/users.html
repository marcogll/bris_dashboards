<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Usuarios — Vanity HQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c10;
      --surface: #111318;
      --surface2: #1a1d24;
      --border: rgba(255, 255, 255, 0.06);
      --text: #e8eaf0;
      --muted: #7c8599;
      --accent: #3b82f6;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --gradient: linear-gradient(135deg, #3b82f6 0%, #6366f1 50%, #a855f7 100%);
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 24px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: inherit;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: white;
      font-size: 18px;
    }
    .logo-text {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .layout-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 30px;
    }
    @media (max-width: 900px) {
      .layout-grid {
        grid-template-columns: 1fr;
      }
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .input, select {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font: inherit;
      font-size: 14px;
      outline: none;
    }
    .input:focus, select:focus {
      border-color: var(--accent);
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover {
      background: #2563eb;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th {
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.05em;
    }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-active {
      background: rgba(16, 185, 129, 0.1);
      color: var(--accent-green);
    }
    .badge-inactive {
      background: rgba(239, 68, 68, 0.1);
      color: var(--accent-red);
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }
    .back-link:hover {
      color: #60a5fa;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="/hq" class="logo-container">
        <div class="logo-icon">V</div>
        <div class="logo-text">Usuarios Centrales</div>
      </a>
    </header>

    <div class="layout-grid">
      <div>
        <div class="card" style="padding: 0; overflow: hidden;">
          <table>
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Usuario</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody>
              {% for u in users %}
              <tr>
                <td><strong>{{ u.name or '' }}</strong></td>
                <td>{{ u.username }}</td>
                <td>{{ u.email or '' }}</td>
                <td>{{ u.role_name }}</td>
                <td>
                  <span class="badge {{ 'badge-active' if u.is_active else 'badge-inactive' }}">
                    {{ 'Activo' if u.is_active else 'Inactivo' }}
                  </span>
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>

      <div>
        <div class="card">
          <h3 class="card-title">Nuevo Usuario</h3>
          <form method="post" action="/users/new">
            <div class="form-group">
              <label>Nombre Completo</label>
              <input class="input" type="text" name="name" required>
            </div>
            <div class="form-group">
              <label>Usuario</label>
              <input class="input" type="text" name="username" required>
            </div>
            <div class="form-group">
              <label>Email</label>
              <input class="input" type="email" name="email" required>
            </div>
            <div class="form-group">
              <label>Contraseña</label>
              <input class="input" type="password" name="password" required>
            </div>
            <div class="form-group">
              <label>Rol de Acceso</label>
              <select name="role_id" required>
                {% for r in roles %}
                <option value="{{ r.id }}">{{ r.name }}</option>
                {% endfor %}
              </select>
            </div>
            <button class="btn" type="submit">Guardar Usuario</button>
          </form>
        </div>
      </div>
    </div>

    <a href="/hq" class="back-link">← Volver al Portal</a>
  </div>
</body>
</html>
