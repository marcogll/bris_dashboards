<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mi Perfil — Vanity HQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0c10;
      --surface: #111318;
      --surface2: #1a1d24;
      --border: rgba(255, 255, 255, 0.06);
      --text: #e8eaf0;
      --muted: #7c8599;
      --accent: #3b82f6;
      --accent-green: #10b981;
      --gradient: linear-gradient(135deg, #3b82f6 0%, #6366f1 50%, #a855f7 100%);
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 24px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: inherit;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: white;
      font-size: 18px;
    }
    .logo-text {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .input:focus {
      border-color: var(--accent);
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover {
      background: #2563eb;
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }
    .back-link:hover {
      color: #60a5fa;
    }
    .flash {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      border: 1px solid;
    }
    .flash.success {
      border-color: var(--accent-green);
      background: rgba(16, 185, 129, 0.1);
      color: #34d399;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a href="/hq" class="logo-container">
        <div class="logo-icon">V</div>
        <div class="logo-text">Mi Perfil</div>
      </a>
    </header>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <div class="card">
      <form method="post" action="/profile">
        <div class="form-group">
          <label>Nombre Completo</label>
          <input class="input" type="text" name="name" value="{{ g.user.name or '' }}" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input class="input" type="email" name="email" value="{{ g.user.email or '' }}" required>
        </div>
        <div class="form-group">
          <label>Teléfono</label>
          <input class="input" type="text" name="phone" value="{{ g.user.phone or '' }}">
        </div>
        <button class="btn" type="submit">Actualizar Perfil</button>
      </form>
    </div>

    <a href="/hq" class="back-link">← Volver al Portal</a>
  </div>
</body>
</html>
