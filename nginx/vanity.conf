upstream hq-wrapper { server hq-wrapper:5050; }
upstream dashboard { server dashboard:5002; }
upstream payroll { server payroll:5051; }
upstream hrmgr { server hrmgr-web:8000; }
upstream actas { server actas:5052; }
upstream empreq { server empreq:5053; }

server {
    listen 80;
    listen [::]:80;
    server_name localhost vanityhq.soul23.cloud;

    client_max_body_size 10M;

    # --- HQ Wrapper (root) ---
    location / {
        proxy_pass http://hq-wrapper;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Dashboard ---
    location /dashboard/ {
        proxy_pass http://dashboard/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /dashboard;
    }

    # --- Payroll ---
    location /payroll/ {
        proxy_pass http://payroll/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /payroll;
    }

    # --- HR Manager ---
    location /empleadas/ {
        proxy_pass http://hrmgr/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Actas ---
    location /actas/ {
        proxy_pass http://actas/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /actas;
    }

    # --- EmpReq ---
    location /empreq/ {
        proxy_pass http://empreq/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /empreq;
    }
}
