services:
  mysql:
    image: mysql:8.4
    volumes:
      - mysql_data:/var/lib/mysql
      - ./adriana_projects/mysql/init:/docker-entrypoint-initdb.d:ro
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-CadrexRoot2026!}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bris_adriana}
      MYSQL_USER: ${MYSQL_USER:-bris_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-CadrexDB_2026!}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysql -u root -p$$MYSQL_ROOT_PASSWORD -e 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  cadrex:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5016:8743"
    volumes:
      - cadrex_data:/app/instance
      - ./data:/app/data
    environment:
      - PORT=8743
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:?required}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER:-bris_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-CadrexDB_2026!}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-bris_adriana}
      - UPLOAD_SECRET=${UPLOAD_SECRET:-}
      - APP_TITLE=${APP_TITLE:-Cadrex | Adriana Ramos}
      - AVAILABLE_SECONDS=${AVAILABLE_SECONDS:-39900}
      - TAKT_SECONDS=${TAKT_SECONDS:-2216.666667}
      - DATA_FILE=${DATA_FILE:-/app/data/stations.csv}
      - LOGIN_REQUIRED=${LOGIN_REQUIRED:-false}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-anthropic/claude-3-haiku}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL:-}
      - FIZZY_API_KEY=${FIZZY_API_KEY:-}
      - FIZZY_BASE_URL=${FIZZY_BASE_URL:-https://fizzy-br.soul23.cloud}
    depends_on:
      - mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8743/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
  cadrex_data:
