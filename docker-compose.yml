services:
  # === Servicios Principales ===
  # NOTA: Sin reverse-proxy. Coolify/Traefik maneja el proxy inverso y SSL.

  # HQ Wrapper (Authentication Central)
  hq-wrapper:
    build:
      context: .
      dockerfile: vanity_hq_wrapper/Dockerfile
    container_name: vanity-hq-wrapper
    ports:
      - "5010:5050"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vanity-hq.rule=Host(`vanityhq.soul23.cloud`)"
      - "traefik.http.routers.vanity-hq.entrypoints=https"
      - "traefik.http.routers.vanity-hq.tls=true"
      - "traefik.http.routers.vanity-hq.tls.certresolver=letsencrypt"
      - "traefik.http.services.vanity-hq.loadbalancer.server.port=5050"
    volumes:
      - hq_wrapper_data:/app/instance
    environment:
      - PORT=5050
      - VANITY_HQ_SECRET_KEY=${VANITY_HQ_SECRET_KEY:?required}
      - VANITY_HQ_TOKEN_MAX_AGE=${VANITY_HQ_TOKEN_MAX_AGE:-43200}
      - VANITY_DASHBOARD_URL=http://dashboard:5002
      - VANITY_HRMGR_URL=http://hrmgr-web:8000
      - VANITY_PAYROLL_URL=http://payroll:5051
      - VANITY_ACTAS_URL=http://actas:5052
      - VANITY_EMPREQ_URL=http://empreq:5053
      - VANITY_HQ_PUBLIC_URL=${VANITY_HQ_PUBLIC_URL:-https://vanityhq.soul23.cloud}
      - VANITY_DASHBOARD_PUBLIC_URL=${VANITY_DASHBOARD_PUBLIC_URL:-https://vanityhq.soul23.cloud/dashboard}
      - VANITY_HRMGR_PUBLIC_URL=${VANITY_HRMGR_PUBLIC_URL:-https://vanityhq.soul23.cloud/empleadas}
      - VANITY_PAYROLL_PUBLIC_URL=${VANITY_PAYROLL_PUBLIC_URL:-https://vanityhq.soul23.cloud/payroll}
      - VANITY_ACTAS_PUBLIC_URL=${VANITY_ACTAS_PUBLIC_URL:-https://vanityhq.soul23.cloud/actas}
      - VANITY_EMPREQ_PUBLIC_URL=${VANITY_EMPREQ_PUBLIC_URL:-https://vanityerq.soul23.cloud}
      - SUPABASE_URL=${SUPABASE_URL:?required}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:?required}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
    restart: unless-stopped
    networks:
      - vanity-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5050/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Dashboard
  dashboard:
    build:
      context: .
      dockerfile: vanity_dashboard/Dockerfile
    container_name: vanity-dashboard
    ports:
      - "5011:5002"
    environment:
      - PORT=5002
      - FLASK_DEBUG=0
      - VANITY_HQ_URL=http://hq-wrapper:5050
      - VANITY_DASHBOARD_SECRET_KEY=${VANITY_DASHBOARD_SECRET_KEY:?required}
      - VANITY_HQ_SECRET_KEY=${VANITY_HQ_SECRET_KEY:?required}
      - VANITY_HQ_PUBLIC_URL=${VANITY_HQ_PUBLIC_URL:-https://vanityhq.soul23.cloud}
      - VANITY_HQ_TOKEN_MAX_AGE=${VANITY_HQ_TOKEN_MAX_AGE:-43200}
      - SUPABASE_URL=${SUPABASE_URL:?required}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:?required}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
    depends_on:
      hq-wrapper:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vanity-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Payroll (Nomina)
  payroll:
    build:
      context: .
      dockerfile: vanity_payroll/Dockerfile
    container_name: vanity-payroll
    ports:
      - "5013:5051"
    volumes:
      - payroll_data:/app/instance
    environment:
      - PORT=5051
      - VANITY_PAYROLL_SECRET_KEY=${VANITY_PAYROLL_SECRET_KEY:?required}
      - VANITY_HQ_URL=http://hq-wrapper:5050
      - VANITY_HQ_SECRET_KEY=${VANITY_HQ_SECRET_KEY:?required}
      - VANITY_HQ_TOKEN_MAX_AGE=${VANITY_HQ_TOKEN_MAX_AGE:-43200}
      - VANITY_HQ_PUBLIC_URL=${VANITY_HQ_PUBLIC_URL:-https://vanityhq.soul23.cloud}
      - PAYROLL_BASE_URL=http://payroll:5051
      - PAYROLL_PUBLIC_URL=${PAYROLL_PUBLIC_URL:-https://vanityhq.soul23.cloud/payroll}
      - SUPABASE_URL=${SUPABASE_URL:?required}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:?required}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
    depends_on:
      hq-wrapper:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vanity-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5051/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # HR Manager (Administracion de Empleados)
  hrmgr-db:
    image: postgres:15
    container_name: vanity-hrmgr-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hrmgr_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${HRMGR_DB_PASSWORD:?required}
    restart: unless-stopped
    networks:
      - vanity-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  hrmgr-redis:
    image: redis:7-alpine
    container_name: vanity-hrmgr-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - vanity-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  hrmgr-web:
    build:
      context: .
      dockerfile: vanity_hrmgr/Dockerfile
    container_name: vanity-hrmgr-web
    ports:
      - "5012:8000"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - DEBUG=${HRMGR_DEBUG:-False}
      - SECRET_KEY=${HRMGR_SECRET_KEY:?required}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-vanityhq.soul23.cloud,www.vanityhq.soul23.cloud,vanityerq.soul23.cloud,localhost}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-https://vanityhq.soul23.cloud,https://www.vanityhq.soul23.cloud,https://vanityerq.soul23.cloud}
      - FORCE_SCRIPT_NAME=${FORCE_SCRIPT_NAME:-/empleadas}
      - POSTGRES_HOST=hrmgr-db
      - POSTGRES_DB=${POSTGRES_DB:-hrmgr_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${HRMGR_DB_PASSWORD:?required}
      - CELERY_BROKER_URL=redis://hrmgr-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://hrmgr-redis:6379/0
      - PAYROLL_BASE_URL=http://payroll:5051
      - PAYROLL_PUBLIC_URL=${PAYROLL_PUBLIC_URL:-https://vanityhq.soul23.cloud/payroll}
      - VANITY_DASHBOARD_URL=http://dashboard:5002
      - VANITY_HRMGR_URL=http://hrmgr-web:8000
      - VANITY_HQ_URL=http://hq-wrapper:5050
      - VANITY_HQ_SECRET_KEY=${VANITY_HQ_SECRET_KEY:?required}
      - VANITY_HQ_TOKEN_MAX_AGE=${VANITY_HQ_TOKEN_MAX_AGE:-43200}
      - VANITY_PAYROLL_URL=http://payroll:5051
      - VANITY_ACTAS_URL=http://actas:5052
      - VANITY_EMPREQ_URL=http://empreq:5053
      - VANITY_HQ_PUBLIC_URL=${VANITY_HQ_PUBLIC_URL:-https://vanityhq.soul23.cloud}
      - VANITY_DASHBOARD_PUBLIC_URL=${VANITY_DASHBOARD_PUBLIC_URL:-https://vanityhq.soul23.cloud/dashboard}
      - VANITY_HRMGR_PUBLIC_URL=${VANITY_HRMGR_PUBLIC_URL:-https://vanityhq.soul23.cloud/empleadas}
      - VANITY_ACTAS_PUBLIC_URL=${VANITY_ACTAS_PUBLIC_URL:-https://vanityhq.soul23.cloud/actas}
      - VANITY_EMPREQ_PUBLIC_URL=${VANITY_EMPREQ_PUBLIC_URL:-https://vanityerq.soul23.cloud}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ADMIN_ID=${TELEGRAM_ADMIN_ID:-}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-true}
      - CSRF_COOKIE_SECURE=${CSRF_COOKIE_SECURE:-true}
      - SUPABASE_URL=${SUPABASE_URL:?required}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:?required}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
    depends_on:
      hrmgr-db:
        condition: service_healthy
      hrmgr-redis:
        condition: service_healthy
      payroll:
        condition: service_started
      hq-wrapper:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vanity-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; req = urllib.request.Request('http://localhost:8000/healthz'); req.add_header('X-Forwarded-Proto', 'https'); r = urllib.request.urlopen(req); assert r.status == 200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  hrmgr-celery:
    build:
      context: .
      dockerfile: vanity_hrmgr/Dockerfile
    container_name: vanity-hrmgr-celery
    command: celery -A config worker -l info
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    environment:
      - SECRET_KEY=${HRMGR_SECRET_KEY:?required}
      - POSTGRES_HOST=hrmgr-db
      - POSTGRES_DB=${POSTGRES_DB:-hrmgr_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${HRMGR_DB_PASSWORD:?required}
      - CELERY_BROKER_URL=redis://hrmgr-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://hrmgr-redis:6379/0
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-true}
      - CSRF_COOKIE_SECURE=${CSRF_COOKIE_SECURE:-true}
      - FORCE_SCRIPT_NAME=${FORCE_SCRIPT_NAME:-/empleadas}
    depends_on:
      hrmgr-db:
        condition: service_healthy
      hrmgr-redis:
        condition: service_healthy
      hq-wrapper:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vanity-network
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping --timeout 10 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  # Actas Administrativas
  actas:
    build:
      context: .
      dockerfile: vanity_actas/Dockerfile
    container_name: vanity-actas
    ports:
      - "5014:5052"
    volumes:
      - actas_data:/app/instance
    environment:
      - PORT=5052
      - VANITY_ACTAS_SECRET_KEY=${VANITY_ACTAS_SECRET_KEY:?required}
      - VANITY_HQ_URL=http://hq-wrapper:5050
      - VANITY_HQ_PUBLIC_URL=${VANITY_HQ_PUBLIC_URL:-https://vanityhq.soul23.cloud}
      - VANITY_HQ_SECRET_KEY=${VANITY_HQ_SECRET_KEY:?required}
      - VANITY_HQ_TOKEN_MAX_AGE=${VANITY_HQ_TOKEN_MAX_AGE:-43200}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-vanityhq.soul23.cloud,www.vanityhq.soul23.cloud,vanityerq.soul23.cloud,localhost}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-true}
      - CSRF_COOKIE_SECURE=${CSRF_COOKIE_SECURE:-true}
      - SUPABASE_URL=${SUPABASE_URL:?required}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:?required}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
    depends_on:
      hq-wrapper:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vanity-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5052/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # EmpReq (Portal de Empleadas)
  empreq:
    build:
      context: .
      dockerfile: vanity_empreq/Dockerfile
    container_name: vanity-empreq
    ports:
      - "5015:5053"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vanity-empreq.rule=Host(`vanityerq.soul23.cloud`)"
      - "traefik.http.routers.vanity-empreq.entrypoints=https"
      - "traefik.http.routers.vanity-empreq.tls=true"
      - "traefik.http.routers.vanity-empreq.tls.certresolver=letsencrypt"
      - "traefik.http.services.vanity-empreq.loadbalancer.server.port=5053"
    volumes:
      - empreq_data:/app/instance
    environment:
      - PORT=5053
      - VANITY_EMPREQ_SECRET_KEY=${VANITY_EMPREQ_SECRET_KEY:?required}
      - VANITY_HQ_URL=http://hq-wrapper:5050
      - VANITY_HQ_PUBLIC_URL=${VANITY_HQ_PUBLIC_URL:-https://vanityhq.soul23.cloud}
      - VANITY_HQ_SECRET_KEY=${VANITY_HQ_SECRET_KEY:?required}
      - VANITY_HQ_TOKEN_MAX_AGE=${VANITY_HQ_TOKEN_MAX_AGE:-43200}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-vanityhq.soul23.cloud,www.vanityhq.soul23.cloud,vanityerq.soul23.cloud,localhost}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-true}
      - CSRF_COOKIE_SECURE=${CSRF_COOKIE_SECURE:-true}
      - SUPABASE_URL=${SUPABASE_URL:?required}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:?required}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
    depends_on:
      hq-wrapper:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vanity-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5053/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx (local reverse proxy)
  nginx:
    image: nginx:alpine
    container_name: vanity-nginx
    ports:
      - "0.0.0.0:80:80"
    volumes:
      - ./nginx/vanity.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      hq-wrapper:
        condition: service_healthy
      dashboard:
        condition: service_healthy
      payroll:
        condition: service_healthy
      hrmgr-web:
        condition: service_healthy
      actas:
        condition: service_healthy
      empreq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vanity-network

networks:
  vanity-network:
    driver: bridge

volumes:
  hq_wrapper_data:
  postgres_data:
  static_volume:
  media_volume:
  payroll_data:
  actas_data:
  empreq_data:
  redis_data:
