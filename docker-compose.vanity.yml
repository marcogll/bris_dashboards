# Integracion de BRIS Dashboard en el ecosistema Vanity Multiagente
# Uso: docker compose -f docker-compose.vanity.yml up -d
#
# Este compose asume que la red vanity-network ya existe (creada por el compose principal de vanity).
# Si no existe, crearla primero: docker network create vanity-network

services:
  bris-dashboard:
    build: .
    container_name: vanity-bris-dashboard
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=5004
      - SECRET_KEY=${SECRET_KEY:?required}
      - FLASK_ENV=production
    expose:
      - "5004"
    volumes:
      - ./data:/app/data
      - bris_data:/app/instance
    networks:
      - vanity-network
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5004/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      - mysql

  mysql:
    image: mysql:8.4
    container_name: vanity-bris-mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bris_adriana}
      MYSQL_USER: ${MYSQL_USER:-bris_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-bris_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-bris_root_password}
    expose:
      - "3306"
    volumes:
      - bris_mysql_data:/var/lib/mysql
      - ./adriana_projects/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - vanity-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-bris_root_password}"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

  adriana-importer:
    build: .
    container_name: vanity-bris-importer
    profiles:
      - import
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
    depends_on:
      - mysql
    command: ["python", "adriana_projects/scripts/load_mysql.py"]
    networks:
      - vanity-network

volumes:
  bris_mysql_data:
  bris_data:

networks:
  vanity-network:
    external: true
